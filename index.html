<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>commit.show — Every commit, on stage.</title>
    <meta name="description" content="The vibe coding league. Audited by the engine, auditioned for Scouts. Run npx commitshow@latest audit on any GitHub repo." />
    <link rel="canonical" href="https://commit.show/" />

    <!-- Icons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#060C1A" />

    <!-- Open Graph · social previews (X, Discord, Slack, LinkedIn, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="commit.show" />
    <meta property="og:title" content="commit.show — Every commit, on stage." />
    <meta property="og:description" content="The vibe coding league. Audited by the engine, auditioned for Scouts. Run npx commitshow@latest audit on any GitHub repo." />
    <meta property="og:url" content="https://commit.show/" />
    <meta property="og:image" content="https://commit.show/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="commit.show — score 82 / 100 · npx commitshow@latest audit" />

    <!-- Twitter / X cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="commit.show — Every commit, on stage." />
    <meta name="twitter:description" content="The vibe coding league. Audited by the engine, auditioned for Scouts." />
    <meta name="twitter:image" content="https://commit.show/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Pretendard · admin console only (loaded once, used inside .admin-shell) -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  </head>
  <body>
    <div id="root">
      <!-- Static fallback shown to crawlers / no-JS clients / very slow first
           paint. Tells AI agents what commit.show is and how to invoke the
           CLI even before the SPA hydrates. Hidden by React on mount. -->
      <noscript>
        <h1>commit.show — Every commit, on stage.</h1>
        <p>The vibe coding league. Audit any AI-assisted GitHub project from
          your terminal in 60 seconds.</p>
        <pre><code>npx commitshow@latest audit github.com/owner/repo</code></pre>
        <p>Or, scoped alias: <code>npx @commit.show/cli audit github.com/owner/repo</code></p>
        <p>Full machine-readable API: <code>npx commitshow@latest audit --json</code></p>
        <p>Discovery file for AI agents: <a href="/llms.txt">/llms.txt</a></p>
        <p>npm: <a href="https://npmjs.com/package/commitshow">commitshow</a></p>
      </noscript>
      <div data-commitshow-fallback hidden aria-hidden="true">
        <h1>commit.show</h1>
        <p>CLI: <code>npx commitshow@latest audit github.com/owner/repo</code></p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

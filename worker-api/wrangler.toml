name = "commitshow-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Public REST surface for commit.show. Bound to api.commit.show as a
# Cloudflare Workers Custom Domain — DNS + binding are provisioned by
# the deploy below, no manual dashboard click required as long as the
# commit.show zone is on this Cloudflare account. This Worker is fully
# isolated from the main Pages project (commit.show) so a routing bug
# here can't break the marketing site.

routes = [
  { pattern = "api.commit.show", custom_domain = true }
]

